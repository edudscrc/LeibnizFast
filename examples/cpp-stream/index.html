<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeibnizFast — C++ Live Stream</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 12px;
    }

    h1 {
      font-size: 1.4rem;
      color: #e0e0ff;
    }

    p.note {
      font-size: 0.85rem;
      color: #aaa;
      max-width: 820px;
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    label {
      font-size: 0.9rem;
    }

    select {
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #2a2a4e;
      color: #eee;
    }

    input[type="number"] {
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #2a2a4e;
      color: #eee;
      width: 72px;
    }

    canvas {
      border: 1px solid #333;
      cursor: crosshair;
    }

    .tooltip {
      position: fixed;
      padding: 6px 10px;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      border-radius: 4px;
      font-size: 0.85rem;
      pointer-events: none;
      display: none;
      font-family: monospace;
    }

    .error-banner {
      width: 100%;
      max-width: 820px;
      padding: 8px 14px;
      background: #5c1a1a;
      color: #ffcccc;
      border: 1px solid #c44;
      border-radius: 4px;
      font-size: 0.85rem;
      display: none;
    }

    /* Connection status badge */
    .status-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      transition: background 0.3s, color 0.3s;
    }

    .status-badge.connecting   { background: #3a3a20; color: #ccc840; }
    .status-badge.connected    { background: #1a3a1a; color: #4ccc4c; }
    .status-badge.disconnected { background: #3a1a1a; color: #cc4444; }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    .fps-counter {
      font-size: 0.85rem;
      color: #aaa;
      font-family: monospace;
      min-width: 72px;
    }

    .range-inputs {
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>LeibnizFast — C++ Live Stream</h1>
    <p class="note">
      2D wave equation solved in C++, streamed over ZeroMQ to a Python WebSocket
      bridge, and rendered live by LeibnizFast. Pan and zoom to explore; hover for
      per-cell values.
    </p>

    <!-- Connection status + FPS -->
    <div class="status-row">
      <span class="status-badge connecting" id="status-badge">
        <span class="status-dot"></span>
        <span id="status-text">Connecting&hellip;</span>
      </span>
      <span class="fps-counter" id="fps-counter">-- FPS</span>
    </div>

    <div class="controls">
      <label for="colormap">Colormap:</label>
      <select id="colormap">
        <option value="viridis" selected>Viridis</option>
        <option value="inferno">Inferno</option>
        <option value="magma">Magma</option>
        <option value="plasma">Plasma</option>
        <option value="cividis">Cividis</option>
        <option value="grayscale">Grayscale</option>
      </select>

      <label for="size">Size:</label>
      <select id="size">
        <option value="64">64×64</option>
        <option value="128">128×128</option>
        <option value="256">256×256</option>
        <option value="512" selected>512×512</option>
        <option value="1024">1024×1024</option>
        <option value="2048">2048×2048</option>
        <option value="4096">4096×4096</option>
      </select>

      <div class="range-inputs">
        <label for="range-min">Min:</label>
        <input type="number" id="range-min" value="-0.5" step="0.05" />
        <label for="range-max">Max:</label>
        <input type="number" id="range-max" value="0.5" step="0.05" />
      </div>

      <label for="debug">
        <input type="checkbox" id="debug" /> Debug timing
      </label>
    </div>

    <div class="error-banner" id="error-banner"></div>
    <canvas id="canvas" width="800" height="600"></canvas>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  Build & run instructions                                    ║
    ╠══════════════════════════════════════════════════════════════╣
    ║  C++ generator (needs libzmq + zlib):                        ║
    ║    apt install libzmq3-dev zlib1g-dev   # Debian/Ubuntu      ║
    ║    brew install zeromq zlib             # macOS              ║
    ║    g++ -std=c++17 -O2 -o generator generator.cpp -lzmq -lz  ║
    ║                                                              ║
    ║  Python bridge (needs pyzmq + websockets):                   ║
    ║    pip install pyzmq websockets                              ║
    ║                                                              ║
    ║  Run (three terminals):                                      ║
    ║    python bridge.py             # terminal 1                 ║
    ║    ./generator                  # terminal 2 (plain)         ║
    ║    ./generator --compress       # zlib only  (~8 FPS@4096²)  ║
    ║    npm run dev (project root)   # terminal 3                 ║
    ║                                                              ║
    ║  Debug mode (per-process perf logs):                         ║
    ║    python bridge.py --debug                                  ║
    ║    ./generator --debug                                       ║
    ║    Check "Debug timing" checkbox in the browser              ║
    ║                                                              ║
    ║  Then open: http://localhost:8080/examples/cpp-stream/       ║
    ╚══════════════════════════════════════════════════════════════╝
  -->
  <script type="module" src="main.js"></script>
</body>

</html>
