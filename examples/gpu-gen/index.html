<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeibnizFast — GPU Data Generation Example</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 12px;
    }

    h1 {
      font-size: 1.4rem;
      color: #e0e0ff;
    }

    p.note {
      font-size: 0.85rem;
      color: #aaa;
      max-width: 820px;
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    label {
      font-size: 0.9rem;
    }

    select {
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #2a2a4e;
      color: #eee;
    }

    canvas {
      border: 1px solid #333;
      cursor: crosshair;
    }

    .tooltip {
      position: fixed;
      padding: 6px 10px;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      border-radius: 4px;
      font-size: 0.85rem;
      pointer-events: none;
      display: none;
      font-family: monospace;
    }

    .error-banner {
      width: 100%;
      max-width: 820px;
      padding: 8px 14px;
      background: #5c1a1a;
      color: #ffcccc;
      border: 1px solid #c44;
      border-radius: 4px;
      font-size: 0.85rem;
      display: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>LeibnizFast — GPU Data Generation</h1>
    <p class="note">
      Sine-wave matrix generated entirely on the GPU via a WebGPU compute shader,
      then read back and passed to LeibnizFast. Eliminates the JS loop bottleneck.
    </p>
    <div class="controls">
      <label for="colormap">Colormap:</label>
      <select id="colormap">
        <option value="viridis" selected>Viridis</option>
        <option value="inferno">Inferno</option>
        <option value="magma">Magma</option>
        <option value="plasma">Plasma</option>
        <option value="cividis">Cividis</option>
        <option value="grayscale">Grayscale</option>
      </select>
      <label for="size">Size:</label>
      <select id="size">
        <option value="100">100×100</option>
        <option value="500">500×500</option>
        <option value="1000" selected>1000×1000</option>
        <option value="2000">2000×2000</option>
        <option value="4000">4000×4000</option>
        <option value="8000">8000×8000</option>
        <option value="16000">16000×16000</option>
        <option value="32000">32000×32000</option>
        <option value="36000">36000×36000</option>
        <option value="40000">40000×40000</option>
      </select>
      <label for="debug">
        <input type="checkbox" id="debug" checked /> Debug timing
      </label>
    </div>
    <div class="error-banner" id="error-banner"></div>
    <canvas id="canvas" width="800" height="600"></canvas>
    <div class="tooltip" id="tooltip"></div>
  </div>
  <script type="module" src="main.js"></script>
</body>

</html>
