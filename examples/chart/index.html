<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeibnizFast — Chart Example</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 12px;
    }

    h1 {
      font-size: 1.4rem;
      color: #e0e0ff;
    }

    p.note {
      font-size: 0.85rem;
      color: #aaa;
      max-width: 820px;
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    label {
      font-size: 0.9rem;
    }

    select,
    button {
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #2a2a4e;
      color: #eee;
      cursor: pointer;
    }

    button:hover {
      background: #3a3a6e;
    }

    input[type="number"],
    input[type="text"] {
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #2a2a4e;
      color: #eee;
      width: 90px;
    }

    .params {
      border: 1px solid #3a3a5e;
      border-radius: 6px;
      padding: 12px 16px;
      max-width: 820px;
      width: 100%;
    }

    .params legend {
      font-size: 0.85rem;
      font-weight: 600;
      color: #aab;
      padding: 0 6px;
      letter-spacing: 0.05em;
    }

    .params-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px 20px;
      margin-bottom: 12px;
    }

    .params-grid label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.82rem;
      color: #ccc;
    }

    .params-grid input {
      width: 100%;
    }

    #chart-canvas {
      width: 800px;
      height: 600px;
      border: 1px solid #333;
      cursor: crosshair;
    }

    .tooltip {
      position: fixed;
      padding: 6px 10px;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      border-radius: 4px;
      font-size: 0.85rem;
      pointer-events: none;
      display: none;
      font-family: monospace;
    }

    .error-banner {
      width: 100%;
      max-width: 820px;
      padding: 8px 14px;
      background: #5c1a1a;
      color: #ffcccc;
      border: 1px solid #c44;
      border-radius: 4px;
      font-size: 0.85rem;
      display: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>LeibnizFast — Static Chart</h1>
    <p class="note">
      GPU-generated sine-wave matrix rendered as a heatmap with configurable
      axes, colormap, and value range. Data is generated on the GPU via a
      WebGPU compute shader. Requires a WebGPU-capable browser.
    </p>

    <!-- Matrix size + colormap + reload -->
    <div class="controls">
      <label for="rows">Rows:</label>
      <input type="number" id="rows" value="500" min="1" max="40000" step="100" />
      <label for="cols">Cols:</label>
      <input type="number" id="cols" value="1000" min="1" max="40000" step="100" />

      <label for="colormap">Colormap:</label>
      <select id="colormap">
        <option value="viridis" selected>Viridis</option>
        <option value="inferno">Inferno</option>
        <option value="magma">Magma</option>
        <option value="plasma">Plasma</option>
        <option value="cividis">Cividis</option>
        <option value="grayscale">Grayscale</option>
      </select>

      <button id="reload">Reload Data</button>
    </div>

    <!-- Axis and value configuration -->
    <fieldset class="params">
      <legend>AXIS &amp; VALUE CONFIG</legend>
      <div class="params-grid">
        <label>
          X Label
          <input type="text" id="x-label" value="Time" />
        </label>
        <label>
          X Unit
          <input type="text" id="x-unit" value="s" />
        </label>
        <label>
          X Min
          <input type="number" id="x-min" value="0" step="any" />
        </label>
        <label>
          X Max
          <input type="number" id="x-max" value="10" step="any" />
        </label>
        <label>
          Y Label
          <input type="text" id="y-label" value="Frequency" />
        </label>
        <label>
          Y Unit
          <input type="text" id="y-unit" value="Hz" />
        </label>
        <label>
          Y Min
          <input type="number" id="y-min" value="0" step="any" />
        </label>
        <label>
          Y Max
          <input type="number" id="y-max" value="22050" step="any" />
        </label>
        <label>
          Value Unit
          <input type="text" id="value-unit" value="dB" />
        </label>
        <label>
          V Min (color)
          <input type="number" id="vmin" value="" step="any" placeholder="auto" />
        </label>
        <label>
          V Max (color)
          <input type="number" id="vmax" value="" step="any" placeholder="auto" />
        </label>
      </div>
    </fieldset>

    <div class="error-banner" id="error-banner"></div>
    <canvas id="chart-canvas"></canvas>
    <div class="tooltip" id="tooltip"></div>
  </div>
  <script type="module" src="main.js"></script>
</body>

</html>
